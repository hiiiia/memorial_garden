version: '3.8' # 본 파일과 버전을 일치시킵니다.

services:
  # 1. 파이썬 하드웨어 제어 에이전트 (오디오, GPIO, 로컬 웹소켓)
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: aicare_agent

    volumes:
      - ./agent:/app
      # [추가] 개발 PC에서도 DB 데이터를 유지하기 위한 볼륨
      - ./data/local_db:/app/local_memory_db 

    environment:
      # [추가] 개발 환경에서도 ChromaDB 경로 인식
      - CHROMA_DB_PATH=/app/local_memory_db 

    # [주의] 윈도우(WSL)에서 실행 시 에러가 나면 아래 두 줄을 임시로 주석 처리하세요.
    devices:
      - "/dev/snd:/dev/snd"
      
    privileged: true 
    
    # .env 파일의 환경 변수를 컨테이너로 주입
    env_file:
      - .env

    # 윈도우 개발용
    ports:
      - "8765:8765"
    
    restart: unless-stopped

  # 2. 어르신용 React UI 웹 서버 (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"  # React 기본 포트(3000)를 내 PC의 3001번으로 연결
    volumes:
      - ./frontend:/app          # 내 PC의 코드를 도커 안으로 실시간 동기화
      - /app/node_modules        # 도커 내부에서 설치된 패키지 폴더는 덮어쓰지 않고 보호
    environment:
      # 윈도우(WSL2) 환경에서 파일 수정이 즉각 감지되도록 강제하는 필수 옵션
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0