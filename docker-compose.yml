version: '3.8'

services:
  # 1. 백엔드 개발 환경
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/app:/app
      - ./shared_uploads:/app/uploads
    ports:
      - "8000:8000"
    env_file:
      - .env  # 백엔드도 .env를 읽어서 DB에 접속합니다.
    environment:
      - AI_PROXY_URL=http://ai:8001

    networks:
      - platform-network

  # 2. AI 중계 서버 개발 환경 (이하 기존과 동일)
  ai:
    build:
      context: ./ai
    volumes:
      - ./ai/app:/app/app
      - ./shared_uploads:/app/uploads
    ports:
      - "8001:8001"
    networks:
      - platform-network

  # 3. 프론트엔드 개발 환경
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    stdin_open: true
    tty: true
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge