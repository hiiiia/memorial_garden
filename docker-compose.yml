version: '0.1'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - platform-network
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AI_PROXY_URL=http://ai_proxy:8001
    networks:
      - platform-network

  ai_proxy:
    build:
      context: ./ai_proxy
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge
